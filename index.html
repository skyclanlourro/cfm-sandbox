<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="CFM Sandbox — Outil de génération de données de test CFM/Cabinpad Air France" />
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-title" content="CFM Sandbox">
  <title>CFM Sandbox</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="app">
    <nav id="globalNav" class="global-nav">
      <div class="global-nav-content">
        <a href="#dashboard" class="logo" data-page="dashboard" title="Dashboard">
          <svg viewBox="0 0 32 32" class="logo-icon">
            <path d="M16 2L4 10v12l12 8 12-8V10L16 2z" fill="var(--blue-500)" />
          </svg>
          <span class="logo-text">Cabin Sandbox</span>
        </a>
        <ul class="nav-list" id="navList">
          <li><a href="#dashboard" class="nav-link active" data-page="dashboard">Dashboard</a></li>
          <li><a href="#transformer" class="nav-link" data-page="transformer">Extract</a></li>
          <li><a href="#guide" class="nav-link" data-page="guide">Guide</a></li>
        </ul>
        <div class="nav-actions">
          <button id="menuToggle" class="menu-toggle" aria-label="Menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="7" x2="21" y2="7" />
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="17" x2="21" y2="17" />
            </svg>
          </button>
        </div>
      </div>
    </nav>
    <div id="mobileNav" class="mobile-nav">
      <ul class="mobile-nav-list">
        <li><a href="#dashboard" class="mobile-nav-link active" data-page="dashboard">Dashboard</a></li>
        <li><a href="#transformer" class="mobile-nav-link" data-page="transformer">Extract</a></li>
        <li><a href="#guide" class="mobile-nav-link" data-page="guide">Guide</a></li>
      </ul>
    </div>
    <main id="mainContent" class="main-content">
      <div id="pageHero" class="page-hero">
        <div class="page-hero-inner">
          <h1 id="pageTitle" class="page-title">Dashboard</h1>
          <div id="pageActions" class="page-actions"></div>
        </div>
      </div>
      <div id="pageContent" class="page-content"></div>
    </main>
    <footer class="global-footer">
      <div class="global-footer-content">
        <div class="footer-divider"></div>
        <div class="footer-bottom">
          <p class="copyright">Créé par Nyam Abdennour & Samuel Paris. Tous droits réservés.</p>
          <ul class="footer-links">
            <li><a href="#guide" data-page="guide" class="nav-link-footer">Guide utilisateur</a></li>
          </ul>
        </div>
      </div>
    </footer>
  </div>
  <div id="toastContainer" class="toast-container"></div>
  <div id="modalOverlay" class="modal-overlay" hidden>
    <div id="modalContent" class="modal-content"></div>
  </div>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registered', reg))
          .catch(err => console.log('Service Worker registration failed', err));
      });
    }
  </script>
</body>

</html>
